{% extends "base.html" %}
{% block title %}Login — CineTrace{% endblock %}

{% block head %}
<style>
  /* Hide sidebar & adjust layout for login page */
  nav { display: none !important; }
  main { margin-left: 0 !important; }
  .mobile-top-bar { display: none !important; }
  footer { display: none !important; }

  /* ── PAGE LAYOUT ── */
  .login-page {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(99, 102, 241, 0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 20%, rgba(139, 92, 246, 0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 100%, rgba(6, 182, 212, 0.04) 0%, transparent 50%),
      var(--bg);
  }

  /* ── GLASSMORPHIC CARD ── */
  .login-card {
    width: 100%;
    max-width: 440px;
    background: rgba(16, 18, 26, 0.65);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 44px 40px 36px;
    box-shadow:
      0 25px 60px rgba(0, 0, 0, 0.5),
      0 0 80px rgba(99, 102, 241, 0.06),
      inset 0 1px 0 rgba(255, 255, 255, 0.04);
    position: relative;
    overflow: hidden;
  }

  .login-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(99, 102, 241, 0.4), rgba(139, 92, 246, 0.3), transparent);
  }

  /* ── LOGO ── */
  .login-logo {
    text-align: center;
    margin-bottom: 32px;
  }

  .login-logo-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 38px;
    letter-spacing: 6px;
    color: var(--text);
    display: inline-flex;
    align-items: center;
    gap: 10px;
  }

  .login-logo-text .logo-accent {
    color: var(--accent-cyan);
  }

  .login-logo-icon {
    width: 28px;
    height: 28px;
    color: var(--accent-cyan);
  }

  .login-logo-sub {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 4px;
    font-weight: 500;
  }

  /* ── ERROR BANNER ── */
  .login-error {
    background: rgba(239, 68, 68, 0.12);
    border: 1px solid rgba(239, 68, 68, 0.25);
    color: #fca5a5;
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 13px;
    text-align: center;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .login-error svg {
    flex-shrink: 0;
    width: 16px;
    height: 16px;
    color: var(--red);
  }

  /* ── CSS-ONLY TAB SWITCHING ── */
  .tab-radios { display: none; }

  .tab-labels {
    display: flex;
    gap: 0;
    margin-bottom: 28px;
    background: rgba(255, 255, 255, 0.03);
    border-radius: 10px;
    padding: 4px;
    border: 1px solid var(--border);
  }

  .tab-label {
    flex: 1;
    text-align: center;
    padding: 11px 0;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
    border-radius: 7px;
    transition: all 0.3s ease;
    user-select: none;
  }

  .tab-label:hover {
    color: var(--text);
  }

  /* Active tab styling */
  #tab-signin:checked ~ .tab-labels .tab-label-signin,
  #tab-signup:checked ~ .tab-labels .tab-label-signup {
    background: var(--primary);
    color: #fff;
    box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
  }

  /* Tab content visibility */
  .tab-panel { display: none; }

  #tab-signin:checked ~ .tab-panel-signin { display: block; }
  #tab-signup:checked ~ .tab-panel-signup { display: block; }

  /* ── FORM ELEMENTS ── */
  .form-group {
    margin-bottom: 18px;
  }

  .form-label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 7px;
  }

  .form-input {
    width: 100%;
    background: rgba(8, 9, 13, 0.6);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 13px 16px;
    border-radius: 8px;
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.3s ease, box-shadow 0.3s ease;
  }

  .form-input::placeholder {
    color: rgba(100, 116, 139, 0.6);
  }

  .form-input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.12), 0 0 20px rgba(99, 102, 241, 0.08);
  }

  .login-btn {
    width: 100%;
    background: var(--primary);
    color: #fff;
    border: none;
    padding: 14px;
    border-radius: 8px;
    font-family: 'Outfit', sans-serif;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 0.5px;
    cursor: pointer;
    margin-top: 6px;
    transition: all 0.25s ease;
    box-shadow: 0 4px 15px rgba(99, 102, 241, 0.25);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .login-btn:hover {
    background: var(--primary-hover);
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(99, 102, 241, 0.35);
  }

  .login-btn:active {
    transform: translateY(0);
  }

  .login-btn svg {
    width: 16px;
    height: 16px;
  }

  /* ── TEST CREDENTIALS ── */
  .test-creds {
    margin-top: 28px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    font-size: 11.5px;
    color: var(--muted);
    text-align: center;
    line-height: 1.8;
  }

  .test-creds strong {
    color: rgba(248, 250, 252, 0.6);
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    font-size: 10px;
  }

  .test-creds .cred-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 6px;
  }

  .cred-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: rgba(99, 102, 241, 0.08);
    border: 1px solid rgba(99, 102, 241, 0.15);
    padding: 3px 10px;
    border-radius: 4px;
    font-size: 11px;
    color: rgba(248, 250, 252, 0.5);
    font-family: 'Outfit', monospace;
  }

  .cred-badge .cred-label {
    color: var(--primary);
    font-weight: 600;
    margin-right: 2px;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 480px) {
    .login-card {
      padding: 32px 24px 28px;
    }
    .login-logo-text {
      font-size: 30px;
      letter-spacing: 4px;
    }
  }
</style>
{% endblock %}

{% block content %}
<div class="login-page">
  <div class="login-card">

    <!-- Logo -->
    <div class="login-logo">
      <div class="login-logo-text">
        <svg class="login-logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
          <line x1="9" y1="3" x2="9" y2="21"></line>
          <line x1="15" y1="3" x2="15" y2="21"></line>
          <line x1="3" y1="9" x2="21" y2="9"></line>
          <line x1="3" y1="15" x2="21" y2="15"></line>
        </svg>
        <span>CINE</span><span class="logo-accent">TRACE</span>
      </div>
      <div class="login-logo-sub">Mapping Cinematic Influence</div>
    </div>

    <!-- Error Banner -->
    {% if error %}
    <div class="login-error">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="15" y1="9" x2="9" y2="15"></line>
        <line x1="9" y1="9" x2="15" y2="15"></line>
      </svg>
      {{ error }}
    </div>
    {% endif %}

    <!-- Hidden radio inputs for CSS tab switching -->
    <input type="radio" name="auth-tab" id="tab-signin" class="tab-radios" checked>
    <input type="radio" name="auth-tab" id="tab-signup" class="tab-radios">

    <!-- Tab labels -->
    <div class="tab-labels">
      <label for="tab-signin" class="tab-label tab-label-signin">Sign In</label>
      <label for="tab-signup" class="tab-label tab-label-signup">Sign Up</label>
    </div>

    <!-- Sign In Panel -->
    <div class="tab-panel tab-panel-signin">
      <form method="POST" action="/login">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-input" required
                 placeholder="name@example.com">
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-input" required
                 placeholder="Enter your password">
        </div>
        <button type="submit" class="login-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
          </svg>
          Sign In
        </button>
      </form>
    </div>

    <!-- Sign Up Panel -->
    <div class="tab-panel tab-panel-signup">
      <form method="POST" action="/register">
        <div class="form-group">
          <label class="form-label">Username</label>
          <input type="text" name="username" class="form-input" required
                 placeholder="Choose a username">
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-input" required
                 placeholder="name@example.com">
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-input" required
                 placeholder="Create a password">
        </div>
        <button type="submit" class="login-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"></path>
          </svg>
          Create Account
        </button>
      </form>
    </div>



  </div>
</div>
{% endblock %}
